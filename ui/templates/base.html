<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Analitiq Stream Configuration Viewer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsoneditor@9.10.2/dist/jsoneditor.min.css">
    <link rel="stylesheet" href="{{ url_for('serve_static_css', filename='fieldMappingVisualizer.css') }}">
    <style>
        .container {
            max-width: 1400px;
        }
        .pipeline-selector {
            margin-bottom: 20px;
        }
        .json-display {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 600px;
            overflow-y: auto;
        }
        .navbar-brand {
            font-weight: bold;
        }
        .section-header {
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .card {
            margin-bottom: 20px;
        }
        #editor-container {
            height: 500px;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Analitiq Stream Config Viewer</a>
            
            {% if pipelines %}
            <div class="ms-auto">
                <form action="{{ url_for('index') }}" method="get" class="d-flex align-items-center">
                    <label class="text-light me-2" for="pipeline">Pipeline:</label>
                    <select class="form-select form-select-sm" id="pipeline" name="pipeline" onchange="this.form.submit()" style="width: auto;">
                        {% for pipeline in pipelines %}
                            <option value="{{ pipeline }}" {% if pipeline == selected %}selected{% endif %}>{{ pipeline }}</option>
                        {% endfor %}
                    </select>
                </form>
            </div>
            {% endif %}
        </div>
    </nav>

    <div class="container my-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsoneditor@9.10.2/dist/jsoneditor.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
