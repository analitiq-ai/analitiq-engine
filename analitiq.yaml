# Analitiq Stream Configuration
# This file configures the Analitiq Stream framework settings

# Path Configuration
paths:
  # Configuration paths (populated by config_fetcher in cloud environments)
  # Each pipeline is a single consolidated file: {pipelines}/{pipeline_id}.json
  # Secrets are kept separate: {secrets}/{connection_id}.json
  pipelines: "./pipelines"
  secrets: "./.secrets"

  # Runtime directories (state, logs, deadletter, metrics)
  state: "./state"
  logs: "./logs"
  deadletter: "./deadletter"
  metrics: "./metrics"

# Pipeline defaults (optional)
defaults:
  # Default environment for pipeline execution
  env: local

  # Default log level
  log_level: INFO

  # Default monitoring interval in seconds
  monitoring_interval_seconds: 5

params:
  PROFILE_ID: 2496403
  BALANCE_ID: 5305253
  SEVDESK_BANK_ACCOUNT_ID: 5936402
