# Pre-commit configuration for Analitiq Stream
# Install with: poetry run pre-commit install

# This is a Python 3.11 project (pyproject `python = "^3.11"`; mypy and black
# both target py311). Pin every hook to 3.11 so the gate does not run on a
# runner's incidental newer interpreter: on 3.12, PEP 701 retokenizes f-string
# internals, and flake8 6.0.0's pycodestyle then misreads `;`/`not in`/`:`
# inside f-string literals as E702/E713/E231. Pinning keeps CI == local == the
# project interpreter.
default_language_version:
  python: python3.11

repos:
  # Code formatting
  - repo: https://github.com/psf/black
    rev: 23.7.0
    hooks:
      - id: black
        language_version: python3.11

  # Import sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: ["--profile", "black"]

  # Linting. flake8-bugbear adds B-checks (B904: re-raise without `from`);
  # flake8-datetimez bans naive datetime.now()/utcnow(); Flake8-pyproject lets
  # flake8 read its [tool.flake8] config from pyproject.toml (issue #265 A).
  # Docstring (D-code) enforcement is intentionally NOT bundled here: the
  # dedicated pydocstyle hook below is the single source for it and honors
  # [tool.pydocstyle] (which the flake8-docstrings plugin would ignore, so
  # bundling it would re-impose the missing-docstring mandate the project opted
  # out of). Define-once: docstring policy lives in one place.
  - repo: https://github.com/pycqa/flake8
    rev: 6.0.0
    hooks:
      - id: flake8
        additional_dependencies:
          - flake8-bugbear
          - flake8-datetimez
          - Flake8-pyproject

  # Type checking. The hook checks only the files a commit/PR touches and
  # follows imports silently, so it reports errors in changed files, not the
  # pre-existing backlog in untouched modules. The src/cdk third-party deps are
  # installed into the hook env (rather than passing --ignore-missing-imports)
  # so a misspelled in-tree import such as `from src.nonexistant import X` is
  # still flagged. `poetry run mypy src/` stays the full strict run;
  # mypy_path=cdk (pyproject) resolves the in-tree cdk package for both.
  - repo: https://github.com/pre-commit/mirrors-mypy
    # Pinned to match the project's own mypy (pyproject dev dep mypy = "^1.5.0"
    # resolves to 1.17.x); an older hook version emits different error codes
    # (import vs import-untyped) and stale unreachable/decorator false
    # positives, so the hook and `poetry run mypy src/` would disagree.
    rev: v1.17.1
    hooks:
      - id: mypy
        args: ["--follow-imports=silent"]
        additional_dependencies:
          - types-requests
          - types-PyYAML
          - pydantic
          - sqlalchemy
          # pyarrow is intentionally NOT installed here. Its compute functions
          # (pc.strptime, pc.assume_timezone) are generated dynamically and
          # absent from newer pyarrow's stubs, so installing it raises
          # attr-defined; pinning an older wheel-less version source-builds and
          # breaks on CI's Python 3.12. The [tool.mypy] pyarrow.* override
          # (ignore_missing_imports) makes it Any instead, matching
          # `poetry run mypy` (the project's pyarrow 12 ships no py.typed).
          - aiohttp
          - aiohttp-retry
          - aiofiles
          - orjson
          - jsonschema
          - python-dotenv
          - python-dateutil
          - protobuf
          - grpcio
          # Published contract packages: the [tool.mypy] override follows
          # their untyped imports (no py.typed yet), so the isolated hook
          # env must be able to resolve them. Pinned to the pyproject pin.
          - analitiq-contract-models==1.0.0rc13
          - analitiq-validator==1.0.0rc13
        exclude: ^(tests/|docs/)

  # Security linting. Config lives in [tool.bandit] in pyproject.toml (read via
  # the toml extra); the old INI-format .bandit file is not valid for bandit's
  # -c flag, which expects YAML/TOML. pbr is pinned because bandit imports
  # stevedore, which needs pbr at runtime (a bare install can resolve without
  # it and then crash on import).
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]", "pbr"]
        exclude: ^tests/

  # General pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-docstring-first
      - id: requirements-txt-fixer

  # Python-specific checks
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.10.1
    hooks:
      - id: pyupgrade
        args: [--py311-plus]

  # Documentation
  - repo: https://github.com/pycqa/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        exclude: ^(tests/|docs/|examples/)
        additional_dependencies: [toml]

# Global configuration. Generated gRPC stubs are excluded here (not only via
# [tool.flake8] exclude): pre-commit passes explicit filenames, for which
# flake8's own `exclude` has no effect, so the hook-level filter is what keeps
# regenerated *_pb2.py out of flake8/black/isort/mypy. The trailing `.*` is
# required to match files *inside* the directory.
exclude: |
  (?x)^(
      \.git/|
      \.venv/|
      venv/|
      \.mypy_cache/|
      \.pytest_cache/|
      __pycache__/|
      build/|
      dist/|
      \.tox/|
      src/grpc/generated/.*
  )$
