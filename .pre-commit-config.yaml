# Pre-commit configuration for Analitiq Stream
# Install with: poetry run pre-commit install

repos:
  # Code formatting
  - repo: https://github.com/psf/black
    rev: 23.7.0
    hooks:
      - id: black
        language_version: python3.11

  # Import sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: ["--profile", "black"]

  # Linting. flake8-bugbear adds B-checks (B904: re-raise without `from`);
  # flake8-datetimez bans naive datetime.now()/utcnow(); Flake8-pyproject lets
  # flake8 read its [tool.flake8] config from pyproject.toml (issue #265 A).
  - repo: https://github.com/pycqa/flake8
    rev: 6.0.0
    hooks:
      - id: flake8
        additional_dependencies:
          - flake8-docstrings
          - flake8-bugbear
          - flake8-datetimez
          - Flake8-pyproject

  # Type checking. The hook checks only the files a commit/PR touches, so it
  # follows imports silently (report errors in changed files, not the large
  # pre-existing type-error backlog in untouched modules) and ignores
  # third-party libs absent from this isolated hook env. `poetry run mypy src/`
  # stays full and strict. mypy_path=cdk (pyproject) resolves the in-tree cdk
  # package for that full run.
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.5.1
    hooks:
      - id: mypy
        args: ["--follow-imports=silent", "--ignore-missing-imports"]
        additional_dependencies:
          - types-requests
          - types-PyYAML
        exclude: ^(tests/|docs/)

  # Security linting
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: ["-c", ".bandit"]
        exclude: ^tests/

  # General pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-docstring-first
      - id: requirements-txt-fixer

  # Python-specific checks
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.10.1
    hooks:
      - id: pyupgrade
        args: [--py311-plus]

  # Documentation
  - repo: https://github.com/pycqa/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        exclude: ^(tests/|docs/|examples/)
        additional_dependencies: [toml]

  # Dead-symbol scan (issue #265 Part A, B1 family). Whole-program analysis:
  # pass_filenames=false so vulture scans the full tree from [tool.vulture]
  # paths (not just changed files); it triggers whenever any Python file
  # changes. vulture_allowlist.py grandfathers symbols live on main today.
  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.11
    hooks:
      - id: vulture
        pass_filenames: false

# Global configuration. vulture_allowlist.py is a generated vulture artifact
# (intentional redefinitions, no docstrings); vulture reads it via its own
# [tool.vulture] paths, so exclude it from every other hook.
exclude: |
  (?x)^(
      \.git/|
      \.venv/|
      venv/|
      \.mypy_cache/|
      \.pytest_cache/|
      __pycache__/|
      build/|
      dist/|
      \.tox/|
      vulture_allowlist\.py
  )$
