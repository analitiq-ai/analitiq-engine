version = 1

# Mark everything under tests/ as test code. DeepSource then applies
# test-appropriate rules to these files and suppresses checks that are false
# positives for pytest -- notably PTC-W0049 (no-self-use), since pytest test
# methods idiomatically take `self` without using it (the class is only a
# grouping for collection). cdk/cdk/conformance is the connector conformance
# suite (issue #391): shipped WITH the CDK but pytest test code by nature --
# assert statements and self-less test methods are its mechanism, exactly the
# BAN-B101 / PYL-R0201 false-positive class test_patterns exists to suppress.
test_patterns = ["tests/**", "cdk/cdk/conformance/**"]

# protoc writes everything under src/grpc/generated/. It is not hand-edited and
# is overwritten on every regeneration, so findings there are unactionable --
# any fix is discarded by the next protoc run. Analysing it also buries the
# findings in first-party code: the generated stubs alone accounted for roughly
# 110 of ~345 live occurrences (PYL-W0212, PYL-R0205, PTC-W0068, PY-W2000).
exclude_patterns = ["src/grpc/generated/**"]

[[analyzers]]
name = "python"

  [analyzers.meta]
  runtime_version = "3.x.x"
