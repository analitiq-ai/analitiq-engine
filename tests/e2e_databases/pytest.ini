[pytest]
# Root the framework here so ``tests.e2e_databases.*`` absolute imports
# resolve and the local markers below register without colliding with the
# repo-wide pytest config.
testpaths = _tests
markers =
    local: pairs that run entirely on local docker databases
    cloud: pairs that involve a managed cloud database
    incremental: incremental replication mode
    full_refresh: full refresh replication mode
addopts =
    -ra
    --tb=short
    --strict-markers
    -p no:cacheprovider
# Live logs matter for multi-minute Docker runs: compose up, engine stdout, and
# skip reasons stream as the suite progresses instead of only on failure.
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
