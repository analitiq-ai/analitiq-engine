[pytest]
testpaths = _tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --tb=short
    --strict-markers
    -p no:cacheprovider
markers =
    local: pairs where both DBs run in Docker locally
    cloud: pairs where at least one DB is a managed cloud service
    full_refresh: replication mode = full_refresh
    incremental: replication mode = incremental
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
