name: analitiq-e2e

services:

  # ---------------------------------------------------------------------------
  # Database fixtures — one source + one destination per supported local DB.
  # Tests bring up only the ones they need via ``docker compose up -d <name>``.
  # ---------------------------------------------------------------------------

  e2e-pg-source:
    image: postgres:16-alpine
    container_name: e2e-pg-source
    environment:
      POSTGRES_DB: e2e_db
      POSTGRES_USER: e2e_user
      POSTGRES_PASSWORD: e2e_password
    ports: ["5433:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e2e_user -d e2e_db"]
      interval: 2s
      timeout: 3s
      retries: 20
    networks: [e2e-net]

  e2e-pg-dest:
    image: postgres:16-alpine
    container_name: e2e-pg-dest
    environment:
      POSTGRES_DB: e2e_db
      POSTGRES_USER: e2e_user
      POSTGRES_PASSWORD: e2e_password
    ports: ["5434:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e2e_user -d e2e_db"]
      interval: 2s
      timeout: 3s
      retries: 20
    networks: [e2e-net]

  e2e-mysql-source:
    image: mysql:8.0
    container_name: e2e-mysql-source
    environment:
      MYSQL_ROOT_PASSWORD: e2e_root
      MYSQL_DATABASE: e2e_db
      MYSQL_USER: e2e_user
      MYSQL_PASSWORD: e2e_password
    command: ["--default-authentication-plugin=mysql_native_password"]
    ports: ["13306:3306"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "e2e_user", "-pe2e_password"]
      interval: 3s
      timeout: 5s
      retries: 30
    networks: [e2e-net]

  e2e-mysql-dest:
    image: mysql:8.0
    container_name: e2e-mysql-dest
    environment:
      MYSQL_ROOT_PASSWORD: e2e_root
      MYSQL_DATABASE: e2e_db
      MYSQL_USER: e2e_user
      MYSQL_PASSWORD: e2e_password
    command: ["--default-authentication-plugin=mysql_native_password"]
    ports: ["13307:3306"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "e2e_user", "-pe2e_password"]
      interval: 3s
      timeout: 5s
      retries: 30
    networks: [e2e-net]

  # ---------------------------------------------------------------------------
  # Engine services. Reuse the production Dockerfile so we test the same image
  # that ships to ECS. Workspace volumes carry the per-test configs.
  # ---------------------------------------------------------------------------

  engine-destination:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    image: analitiq-stream:latest
    container_name: e2e-engine-destination
    environment:
      RUN_MODE: destination
      GRPC_PORT: 50051
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PIPELINE_ID: ${PIPELINE_ID:-}
      DESTINATION_INDEX: 0
      ENV: loc
    volumes:
      - ../../connectors:/app/connectors:ro
      - ./workspace/connections:/app/connections
      - ./workspace/pipelines:/app/pipelines
      - ./workspace/state:/app/state
      - ./workspace/deadletter:/app/deadletter
    expose: ["50051"]
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',50051),2); s.close()"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 8s
    networks: [e2e-net]

  source_engine:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    image: analitiq-stream:latest
    container_name: e2e-source-engine
    environment:
      RUN_MODE: source
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PIPELINE_ID: ${PIPELINE_ID:-}
      DESTINATION_GRPC_HOST: engine-destination
      DESTINATION_GRPC_PORT: 50051
      ENV: loc
    volumes:
      - ../../connectors:/app/connectors:ro
      - ./workspace/connections:/app/connections
      - ./workspace/pipelines:/app/pipelines
      - ./workspace/state:/app/state
      - ./workspace/deadletter:/app/deadletter
    depends_on:
      engine-destination:
        condition: service_healthy
    networks: [e2e-net]

networks:
  e2e-net:
    name: analitiq-e2e-net
    driver: bridge
