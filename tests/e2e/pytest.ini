[tool:pytest]
# Pytest configuration for E2E tests

# Test discovery
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    fault_tolerance: Fault tolerance and resilience tests
    data_quality: Data quality and schema evolution tests
    performance: Performance and scalability tests (may be slow)
    network: Network resilience and connectivity tests
    state: State management and recovery tests
    comprehensive: Comprehensive edge case scenarios
    basic_e2e: Basic end-to-end connector tests
    resilience: General resilience tests
    schema: Schema-related tests
    scalability: Scalability tests
    connectivity: Connectivity tests
    recovery: Recovery tests
    chaos: Chaos engineering tests
    stress: Stress tests
    slow: Tests that take a long time to run

# Output configuration
addopts =
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes
    --durations=10
    --verbose

# Asyncio configuration
asyncio_mode = auto

# Timeout configuration (in seconds)
timeout = 300

# Minimum Python version
minversion = 3.11

# Test execution
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:asyncio