name: ci

# Enforces the engine's own standards on every PR and push (issue #265 Part A).
# The lint job runs the pre-commit stack against the files a change touches, so
# a PR that introduces a bare/broad swallow, a dead symbol, a naive datetime, a
# new type error, or a style/format regression fails CI -- without retroactively
# blocking on the pre-existing debt in untouched modules.

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        # Core + dev groups only. The optional extras (kafka, cloud, nosql, ...)
        # ship with their connector packages, not the engine, and no test
        # imports them unguarded; boto3 arrives transitively via the core deps.
        run: poetry install --no-interaction

      - name: Run tests
        # These six modules already fail on main independent of this PR (there
        # was no pytest CI to catch it): some are coupled to the gitignored
        # on-disk registry (connectors/, pipelines/manifest.json) -- which is
        # absent by design, since connector/pipeline/stream/endpoint/connection
        # shapes come from the published contract schemas, not sample fixtures
        # kept here -- and some are stale tests out of sync with current
        # signatures (e.g. ConnectionRuntime now requires connector_id). They
        # cannot gate CI as-is; the ~1740 self-contained tests do. Decoupling
        # and repairing them is tracked in issue #278.
        run: |
          poetry run pytest \
            --ignore=tests/integration/test_api_connector.py \
            --ignore=tests/integration/test_config_payload_structure.py \
            --ignore=tests/integration/test_engine_failure_handling.py \
            --ignore=tests/unit/analitiq_stream/core/test_engine_unit.py \
            --ignore=tests/unit/cdk_tests/sql/test_ddl.py \
            --ignore=tests/unit/cdk_tests/sql/test_discovery.py

  lint:
    name: pre-commit (changed files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the changed-file range can be diffed.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: pipx install pre-commit

      - name: Cache pre-commit hook environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Resolve changed-file range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            from="${{ github.event.pull_request.base.sha }}"
            to="${{ github.event.pull_request.head.sha }}"
          else
            from="${{ github.event.before }}"
            to="${{ github.sha }}"
            # First push of a branch (or a missing parent) has no usable
            # `before`; fall back to the merge-base with the default branch so
            # every commit the push introduced is checked, not just the tip.
            if [ -z "$from" ] || ! git cat-file -e "${from}^{commit}" 2>/dev/null; then
              base_ref="origin/${{ github.event.repository.default_branch }}"
              from="$(git merge-base "$base_ref" "$to" 2>/dev/null \
                || git rev-parse "${to}^" 2>/dev/null || echo "$to")"
            fi
          fi
          echo "from=$from" >> "$GITHUB_OUTPUT"
          echo "to=$to" >> "$GITHUB_OUTPUT"

      - name: Run pre-commit on changed files
        run: |
          pre-commit run \
            --from-ref "${{ steps.range.outputs.from }}" \
            --to-ref "${{ steps.range.outputs.to }}" \
            --show-diff-on-failure
