name: ci

# Enforces the engine's own standards on every PR and push to main (issue #265 Part A).
# The lint job runs the pre-commit stack against the files a change touches, so
# a PR that introduces a bare/broad swallow, a dead symbol, a naive datetime, a
# new type error, or a style/format regression fails CI -- without retroactively
# blocking on the pre-existing debt in untouched modules.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        # Core + dev groups only. The optional extras (kafka, cloud, nosql, ...)
        # ship with their connector packages, not the engine, and no test
        # imports them unguarded; boto3 arrives transitively via the core deps.
        run: poetry install --no-interaction

      - name: Run tests
        run: poetry run pytest

  conformance-live:
    name: conformance kit (live tier vs postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: conformance
          POSTGRES_PASSWORD: conformance
          POSTGRES_DB: conformance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U conformance"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Install the reference connector's driver
        # The engine pins no database drivers (drivers belong to connector
        # packages); this job installs asyncpg exactly as a connector repo's
        # CI installs its own requirements before running the live tier.
        run: poetry run pip install asyncpg

      - name: Run the live tier against the service container
        env:
          CONFORMANCE_PG_HOST: 127.0.0.1
          CONFORMANCE_PG_PORT: "5432"
          CONFORMANCE_PG_DATABASE: conformance
          CONFORMANCE_PG_USER: conformance
          CONFORMANCE_PG_PASSWORD: conformance
        run: poetry run pytest tests/conformance_kit/test_kit_live_reference.py

  lint:
    name: pre-commit (all files)
    runs-on: ubuntu-latest
    steps:
      # The whole tree passes the strict stack (black, isort, flake8 +bugbear
      # +datetimez, mypy, pydocstyle, bandit), so the gate runs on all files
      # rather than only the PR diff -- this locks the cleaned state in and
      # fails any reintroduced violation anywhere, not just in touched files.
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: pipx install pre-commit

      - name: Cache pre-commit hook environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure
