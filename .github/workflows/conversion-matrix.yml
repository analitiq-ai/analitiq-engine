name: conversion-matrix

# Publishes the engine's contract artifacts to their distribution channels
# when they change. Both artifacts are generated from canonical tables in the
# CDK and pinned by conformance tests, so no channel can drift from the code.
#
#   1. @analitiq-ai/conversion-matrix on GitHub Packages, so the frontend can
#      pin the typed helpers over the grid.
#   2. Versioned raw JSON on S3 (sync-s3 job) — the conversion grid and the
#      arrow_type parameter grammar, each under its own prefix with its own
#      independent version history — one leg per target environment (dev,
#      prod), so non-npm consumers can pin the contracts without registry
#      credentials. Authentication is GitHub OIDC (short-lived, no stored
#      keys); the role, region, and bucket come exclusively from GitHub
#      Environment variables, so no cloud identifiers live in this repo. An
#      environment with no role ARN configured skips its steps; once the role
#      ARN is set, the remaining variables are required and fail loud when
#      missing.

on:
  push:
    branches: [main]
    paths:
      - cdk/cdk/type_map/conversion_matrix.json
      - cdk/cdk/type_map/arrow_type_grammar.json
      - packages/conversion-matrix/**
      - .github/workflows/conversion-matrix.yml
  pull_request:
    paths:
      - cdk/cdk/type_map/conversion_matrix.json
      - cdk/cdk/type_map/arrow_type_grammar.json
      - packages/conversion-matrix/**
      - .github/workflows/conversion-matrix.yml

defaults:
  run:
    working-directory: packages/conversion-matrix

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - name: Unit tests (arrowFamily / getConversion) gate the package
        run: npm test
      - name: Packaged grid is byte-identical to the engine source
        run: cmp dist/conversion_matrix.json ../../cdk/cdk/type_map/conversion_matrix.json

  publish:
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    # Serialize publishes so two quick pushes to main cannot race on the version.
    concurrency:
      group: conversion-matrix-publish
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      # Build from the current tip of main, not the triggering commit. Publishing
      # per-commit is wrong two ways: if verify jobs finish out of order an older
      # commit could ship a stale grid as a higher version, and a later unrelated
      # push (which does not re-trigger this path-filtered workflow) could strand
      # a matrix change unpublished. Building main's tip always publishes the
      # current grid; the content digest makes a duplicate run a no-op and the
      # concurrency group serializes racing publishes.
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@analitiq-ai"
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - name: Publish when the grid content changed
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/publish-if-changed.mjs

  sync-s3:
    # Versions on S3 are independent of the npm version: the npm digest covers
    # the shipped TS code too, while each S3 artifact (the grid, the grammar)
    # versions alone on its own content. The sync script reconciles against
    # the latest.json manifest on S3, so a re-run after a partial failure
    # converges on its own. (The first-ever run additionally needs the role to
    # grant s3:ListBucket, so a missing manifest reads as absence, not as
    # Forbidden.) Each environment's bucket keeps its own independent version
    # history; content is compared across buckets by the manifest sha256.
    #
    # The role/region/bucket variables are ENVIRONMENT-scoped — each
    # environment carries its own values under the same names — which is why
    # the gate sits on the steps, not the job: a job-level `if` is evaluated
    # before the environment attaches and would read every environment-scoped
    # variable as empty. An unconfigured environment shows as a green leg with
    # skipped steps.
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      # Legs are independent: a dev hiccup must not hold back prod, or the
      # other way round.
      fail-fast: false
      matrix:
        env: [dev, prod]
    # The job's OIDC subject claim carries this repo + environment; each
    # account's role trust policy pins its own environment (dev role -> dev,
    # prod role -> prod). Protection rules for an environment are a
    # repo-settings concern, not a workflow one.
    environment: ${{ matrix.env }}
    concurrency:
      group: conversion-matrix-s3-sync-${{ matrix.env }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      # Tip of main, same rationale as the publish job: always sync the current
      # grid, never a stale triggering commit.
      - uses: actions/checkout@v4
        if: vars.CONVERSION_MATRIX_S3_ROLE_ARN != ''
        with:
          ref: main
      - uses: actions/setup-node@v4
        if: vars.CONVERSION_MATRIX_S3_ROLE_ARN != ''
        with:
          node-version: "20"
      - uses: aws-actions/configure-aws-credentials@v4
        if: vars.CONVERSION_MATRIX_S3_ROLE_ARN != ''
        with:
          role-to-assume: ${{ vars.CONVERSION_MATRIX_S3_ROLE_ARN }}
          aws-region: ${{ vars.CONVERSION_MATRIX_S3_REGION }}
      - name: Sync versioned contract artifacts to S3 when their content changed
        if: vars.CONVERSION_MATRIX_S3_ROLE_ARN != ''
        env:
          CONVERSION_MATRIX_S3_BUCKET: ${{ vars.CONVERSION_MATRIX_S3_BUCKET }}
        run: node scripts/sync-contracts-to-s3.mjs
