name: conversion-matrix

# Publishes the engine's conversion grid to its two distribution channels when
# it changes. The grid is generated from cdk/cdk/type_map/conversion_matrix.json;
# both channels regenerate from it on every run and cannot drift.
#
#   1. @analitiq-ai/conversion-matrix on GitHub Packages, so the frontend can
#      pin the typed helpers.
#   2. Versioned raw JSON on S3 (sync-s3 job), so non-npm consumers can pin the
#      grid without registry credentials. Authentication is GitHub OIDC
#      (short-lived, no stored keys); the role, region, bucket, and prefix come
#      exclusively from repository variables, so no cloud identifiers live in
#      this repo, and the job is skipped entirely until those variables are
#      configured against the provisioned infrastructure.

on:
  push:
    branches: [main]
    paths:
      - cdk/cdk/type_map/conversion_matrix.json
      - packages/conversion-matrix/**
      - .github/workflows/conversion-matrix.yml
  pull_request:
    paths:
      - cdk/cdk/type_map/conversion_matrix.json
      - packages/conversion-matrix/**
      - .github/workflows/conversion-matrix.yml

defaults:
  run:
    working-directory: packages/conversion-matrix

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - name: Unit tests (arrowFamily / getConversion) gate the package
        run: npm test
      - name: Packaged grid is byte-identical to the engine source
        run: cmp dist/conversion_matrix.json ../../cdk/cdk/type_map/conversion_matrix.json

  publish:
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    # Serialize publishes so two quick pushes to main cannot race on the version.
    concurrency:
      group: conversion-matrix-publish
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      # Build from the current tip of main, not the triggering commit. Publishing
      # per-commit is wrong two ways: if verify jobs finish out of order an older
      # commit could ship a stale grid as a higher version, and a later unrelated
      # push (which does not re-trigger this path-filtered workflow) could strand
      # a matrix change unpublished. Building main's tip always publishes the
      # current grid; the content digest makes a duplicate run a no-op and the
      # concurrency group serializes racing publishes.
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@analitiq-ai"
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - name: Publish when the grid content changed
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/publish-if-changed.mjs

  sync-s3:
    # Versions on S3 are independent of the npm version: the npm digest covers
    # the shipped TS code too, while S3 carries the grid alone, so the two cut
    # versions at different times by design. The sync script reconciles against
    # the latest.json manifest on S3, so a re-run after a partial failure (or
    # the first run after the variables are configured) converges on its own.
    if: github.event_name == 'push' && vars.CONVERSION_MATRIX_S3_ROLE_ARN != ''
    needs: verify
    runs-on: ubuntu-latest
    # The OIDC trust policy pins this repo + environment in its subject claim,
    # mirroring the schemas-publisher pattern; protection rules for the
    # environment are a repo-settings concern, not a workflow one.
    environment: conversion-matrix
    concurrency:
      group: conversion-matrix-s3-sync
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      # Tip of main, same rationale as the publish job: always sync the current
      # grid, never a stale triggering commit.
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.CONVERSION_MATRIX_S3_ROLE_ARN }}
          aws-region: ${{ vars.CONVERSION_MATRIX_S3_REGION }}
      - name: Sync versioned grid to S3 when the grid content changed
        env:
          CONVERSION_MATRIX_S3_BUCKET: ${{ vars.CONVERSION_MATRIX_S3_BUCKET }}
          CONVERSION_MATRIX_S3_PREFIX: ${{ vars.CONVERSION_MATRIX_S3_PREFIX }}
        run: node scripts/sync-matrix-to-s3.mjs
