name: conversion-matrix

# Publishes @analitiq-ai/conversion-matrix to GitHub Packages when the engine's
# conversion grid changes, so the frontend can pin it. The grid is generated
# from cdk/cdk/type_map/conversion_matrix.json; the package regenerates from it
# on every build and cannot drift.

on:
  push:
    branches: [main]
    paths:
      - cdk/cdk/type_map/conversion_matrix.json
      - packages/conversion-matrix/**
      - .github/workflows/conversion-matrix.yml
  pull_request:
    paths:
      - cdk/cdk/type_map/conversion_matrix.json
      - packages/conversion-matrix/**
      - .github/workflows/conversion-matrix.yml

defaults:
  run:
    working-directory: packages/conversion-matrix

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - name: Packaged grid is byte-identical to the engine source
        run: cmp dist/conversion_matrix.json ../../cdk/cdk/type_map/conversion_matrix.json

  publish:
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    # Serialize publishes so two quick pushes to main cannot race on the version.
    concurrency:
      group: conversion-matrix-publish
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@analitiq-ai"
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      # verify jobs can finish out of order, so an older commit could otherwise
      # reach publish last and ship a stale grid as a higher version. Only the
      # run whose commit is the current main tip publishes; superseded runs skip.
      - name: Skip if superseded by a newer commit on main
        id: latest
        run: |
          git fetch origin main --depth=1 --quiet
          if [ "$(git rev-parse origin/main)" = "${{ github.sha }}" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Superseded by a newer commit on main; skipping publish."
          fi
      - name: Publish when the grid content changed
        if: steps.latest.outputs.publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/publish-if-changed.mjs
