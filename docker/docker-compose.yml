services:
  analitiq-stream:
    build:
      context: ..
      dockerfile: Dockerfile
    image: analitiq-stream:latest
    container_name: analitiq-stream-pipeline

    # Base environment variables - these are set at service/image level
    # Per-invocation variables (PIPELINE_ID, CLIENT_ID) must be passed at runtime:
    #   docker compose run -e PIPELINE_ID=xxx -e CLIENT_ID=yyy analitiq-stream
    env_file: .env
    environment:
      - ENV=${ENV:-local}
      - AWS_REGION=${AWS_REGION:-eu-central-1}
      - LOCAL_CONFIG_MOUNT=${LOCAL_CONFIG_MOUNT:-/config}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # DynamoDB table names (required for dev/prod environments)
      - PIPELINES_TABLE=${PIPELINES_TABLE:-pipelines}
      - CONNECTIONS_TABLE=${CONNECTIONS_TABLE:-connections}
      - CONNECTORS_TABLE=${CONNECTORS_TABLE:-connectors}
      - ENDPOINTS_TABLE=${ENDPOINTS_TABLE:-connectors_endpoints}
      - ENDPOINTS_TABLE=${ENDPOINTS_TABLE:-connectors_endpoints}
      # S3 bucket for row count metrics
      - ROW_COUNT_BUCKET=${ROW_COUNT_BUCKET:-analitiq-client-pipeline-row-count}

    # Volume mounts for local development
    volumes:
      # Mount local config directory for testing
      - ../examples/wise_to_sevdesk:/config:ro

      # Mount state, logs, and deadletter directories for persistence
      - analitiq_state:/app/state
      - analitiq_logs:/app/logs
      - analitiq_deadletter:/app/deadletter

    # Resource limits (similar to ECS task definition)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M

    # Restart policy - "no" for one-shot pipeline jobs that should exit after completion
    # Use "unless-stopped" only for long-running services
    restart: "no"

    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "from src.core.pipeline_config_prep import PipelineConfigPrep; print('Health check passed')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

# Named volumes for data persistence
volumes:
  analitiq_state:
    driver: local
  analitiq_logs:
    driver: local
  analitiq_deadletter:
    driver: local

# Example network configuration (if needed)
networks:
  default:
    driver: bridge