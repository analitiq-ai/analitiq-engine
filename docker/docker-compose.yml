services:
  # ===========================================================================
  # Destination Service (gRPC server for data ingestion)
  # ===========================================================================
  # This service receives streamed data from the source_engine via gRPC and writes
  # it to the destination database. Same image as source_engine, different RUN_MODE.
  # Both services use PIPELINE_ID to load configuration via PipelineConfigPrep.
  destination:
    build:
      context: ..
      dockerfile: Dockerfile
    image: analitiq-stream:latest
    container_name: analitiq-destination

    # Base environment variables - per-invocation vars (PIPELINE_ID)
    # must be passed at runtime: docker compose run -e PIPELINE_ID=xxx destination
    env_file:
      - .env
    environment:
      - RUN_MODE=destination
      - ENV=${ENV:-local}
      - GRPC_PORT=50051
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      # DESTINATION_INDEX selects which destination from pipeline config (default: 0)
      - DESTINATION_INDEX=${DESTINATION_INDEX:-0}
      # Pipeline identification (required at runtime)
      - PIPELINE_ID=${PIPELINE_ID}
      # AWS configuration
      - AWS_PROFILE=${AWS_PROFILE:-}
      - AWS_REGION=${AWS_REGION:-eu-central-1}

    # Volume mounts for modular config files
    # Convention-based discovery finds pipelines/manifest.json at /app/pipelines/
    volumes:
      - ../src:/app/src  # Live code changes without rebuild
      - ../connectors:/app/connectors
      - ../connections:/app/connections  # includes .secrets/ per connection
      - ../pipelines:/app/pipelines
      - ~/.aws:/home/appuser/.aws:ro

    # Expose gRPC port to other containers
    expose:
      - "50051"

    # Health check using gRPC health protocol
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; print('gRPC available')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

    # Long-running server - restart on failure
    restart: unless-stopped

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

    networks:
      - analitiq-net

  # ===========================================================================
  # Source Engine Service (Pipeline orchestrator)
  # ===========================================================================
  # This service runs the data pipeline: extract -> transform -> stream to destination.
  # Same image as destination, different RUN_MODE.
  source_engine:
    build:
      context: ..
      dockerfile: Dockerfile
    image: analitiq-stream:latest
    container_name: analitiq-source-engine

    # Base environment variables - per-invocation vars (PIPELINE_ID)
    # must be passed at runtime: docker compose run -e PIPELINE_ID=xxx source_engine
    env_file:
      - .env
    environment:
      - RUN_MODE=engine
      - ENV=${ENV:-local}
      - AWS_REGION=${AWS_REGION:-eu-central-1}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # gRPC destination connection
      - DESTINATION_GRPC_HOST=destination
      - DESTINATION_GRPC_PORT=50051
      # S3 bucket for row count metrics
      - ROW_COUNT_BUCKET=${ROW_COUNT_BUCKET:-analitiq-client-pipeline-row-count}
      # Pipeline identification (required at runtime)
      - PIPELINE_ID=${PIPELINE_ID}
      # AWS configuration
      - AWS_PROFILE=${AWS_PROFILE:-}

    # Volume mounts for modular config files
    # Convention-based discovery finds pipelines/manifest.json at /app/pipelines/
    volumes:
      - ../src:/app/src  # Live code changes without rebuild
      - ../connectors:/app/connectors
      - ../connections:/app/connections  # includes .secrets/ per connection
      - ../pipelines:/app/pipelines
      - ~/.aws:/home/appuser/.aws:ro
      # Mount state, logs, and deadletter directories for persistence
      - ../state:/app/state
      - ../logs:/app/logs
      - ../deadletter:/app/deadletter
      - ../metrics:/app/metrics

    # Resource limits (similar to ECS task definition)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M

    # One-shot pipeline job - exit after completion
    restart: "no"

    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "from src.engine.pipeline_config_prep import PipelineConfigPrep; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

    depends_on:
      destination:
        condition: service_healthy

    networks:
      - analitiq-net

# ===========================================================================
# Named volumes for data persistence
# ===========================================================================
volumes:
  postgres_data:
    driver: local

# ===========================================================================
# Network configuration
# ===========================================================================
networks:
  analitiq-net:
    driver: bridge