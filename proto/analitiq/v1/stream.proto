// Protocol definitions for Analitiq Stream gRPC communication
// Engine -> Destination bidirectional streaming

syntax = "proto3";

package analitiq.v1;

option java_multiple_files = true;
option java_package = "com.analitiq.v1";

// Payload encoding format for record batches.
// Arrow IPC is the only supported format: typed columnar data is
// preserved end-to-end without a dict round-trip on either end.
enum PayloadFormat {
  PAYLOAD_FORMAT_UNSPECIFIED = 0;
  PAYLOAD_FORMAT_ARROW_IPC = 1;
}

// Opaque cursor - produced by engine, stored/returned by destination
// Destination does NOT interpret this; only stores and returns it
message Cursor {
  // Opaque bytes encoding the cursor position
  // Engine-defined format (timestamp + tie-breaker, LSN, composite key, etc.)
  bytes token = 1;
}

// Write mode for destination operations
enum WriteMode {
  WRITE_MODE_UNSPECIFIED = 0;
  WRITE_MODE_INSERT = 1;           // Insert only, fail on conflict
  WRITE_MODE_UPSERT = 2;           // Upsert (insert or update on conflict)
  WRITE_MODE_TRUNCATE_INSERT = 3;  // Truncate table before insert (full refresh)
}

// Schema message - sent once at stream start.
//
// Only carries enough to identify which preloaded contract endpoint the
// destination should configure for. Both engine and destination load the
// contract artifacts via PipelineConfigPrep from the same PIPELINE_ID, so
// schema details (columns, primary keys, target table, etc.) are not
// transmitted on the wire — the destination reads them from the contract
// endpoint document keyed by stream_id.
message SchemaMessage {
  // Stream identification - the destination looks up its preloaded
  // contract endpoint document by this ID.
  string stream_id = 1;

  // Schema version for evolution tracking.
  uint32 version = 2;

  // Write mode for this stream (insert, upsert, truncate_insert).
  WriteMode write_mode = 3;

  // The sender's gRPC ack budget in seconds — the longest it waits for the
  // SchemaAck / each BatchAck before abandoning the stream. The destination
  // derives its per-statement timeout from this value, so a blocked DDL or
  // write is cancelled before the sender gives up (issue #234). Always
  // positive on a conforming handshake; a forwarding hop (the destination
  // shell's worker proxy) adopts the received budget as its own ack wait
  // and re-stamps it, so the budget the engine waits on holds end-to-end.
  uint32 ack_timeout_seconds = 4;
}

// Record batch message - contains a batch of data records
message RecordBatch {
  // Idempotency keys (for exactly-once semantics)
  string run_id = 1;
  string stream_id = 2;
  uint64 batch_seq = 3;  // Monotonically increasing per stream within run

  // Payload encoding
  PayloadFormat format = 4;
  bytes payload = 5;       // Arrow IPC stream bytes (single record batch)
  uint32 record_count = 6;

  // Per-record identifiers for stable DLQ correlation
  // Each record in payload has corresponding ID at same index
  // Format: counter within batch or sha1(pk + cursor + run_id)
  repeated string record_ids = 7;

  // Opaque cursor representing MAX watermark in this batch
  // Engine computes this as max(cursor_field) across all records
  // Destination stores and returns in ACK
  Cursor cursor = 8;
}

// ACK status values
enum AckStatus {
  ACK_STATUS_UNSPECIFIED = 0;
  ACK_STATUS_SUCCESS = 1;            // All records written, cursor advanced
  ACK_STATUS_ALREADY_COMMITTED = 2;  // Idempotent replay, batch already committed
  ACK_STATUS_RETRYABLE_FAILURE = 3;  // No commit occurred, safe to retry entire batch
  ACK_STATUS_FATAL_FAILURE = 4;      // No commit occurred, do not retry, send to DLQ
  // Note: No PARTIAL_SUCCESS - all-or-nothing per batch for simpler semantics
}

// Batch acknowledgment from destination to engine
message BatchAck {
  // Echo back idempotency keys for correlation
  string run_id = 1;
  string stream_id = 2;
  uint64 batch_seq = 3;

  // Result status
  AckStatus status = 4;
  uint32 records_written = 5;

  // Committed cursor (engine persists this)
  // Returned on SUCCESS and ALREADY_COMMITTED
  Cursor committed_cursor = 6;

  // OPTIONAL diagnostic info for FATAL_FAILURE
  // May be incomplete (DB errors often can't identify specific record)
  // Engine sends ENTIRE batch to DLQ regardless of this field
  repeated string failed_record_ids = 7;
  string failure_summary = 8;  // Human-readable summary: "constraint violation on column X"
}

// Request wrapper for bidirectional stream (engine -> destination)
message StreamRequest {
  oneof message {
    SchemaMessage schema = 1;
    RecordBatch batch = 2;
  }
}

// Response wrapper for bidirectional stream (destination -> engine)
message StreamResponse {
  oneof message {
    BatchAck ack = 1;
    SchemaAck schema_ack = 2;
  }
}

// Retry semantics a destination guarantees for one stream on a
// same-RUN_ID restart (issue #286). EXACTLY_ONCE means the handler
// dedups re-sent records by row identity (MERGE / anti-join, or a
// per-record idempotency key on an API), so a restart can neither
// duplicate nor drop. AT_LEAST_ONCE means a restart is NOT replay-safe:
// depending on the sink, committed records are re-applied (duplicate
// side effects) or re-batched rows are misclassified (skipped or
// truncated away) — the reason string names the concrete failure mode.
enum RetrySemantics {
  RETRY_SEMANTICS_UNSPECIFIED = 0;
  RETRY_SEMANTICS_EXACTLY_ONCE = 1;
  RETRY_SEMANTICS_AT_LEAST_ONCE = 2;
}

// Schema acknowledgment (sent after SchemaMessage)
message SchemaAck {
  string stream_id = 1;
  bool accepted = 2;
  string message = 3;  // Error message if not accepted

  // Retry-safety verdict for this stream, set on an accepted ack.
  // The handler owning the sink decides (write mode, keys, transport,
  // declared idempotency all factor in); the engine logs it at stream
  // start so operators know which streams can duplicate on a restart.
  RetrySemantics retry_semantics = 4;
  string retry_semantics_reason = 5;
}
