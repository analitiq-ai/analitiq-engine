# Stream State (incremental replication) — YAML representation
version: "1.0"

pipeline_id: "b0c2f9d0-3b2a-4a7e-8c86-1b9c6c2d7b15"
stream_id: "f1a2b3c4-d5e6-7890-abcd-ef1234567891"

status: idle                  # idle | running | paused | error
is_enabled: true              # optional convenience flag

# Pin which stream config revision produced this state (recommended)
stream_version: 1.0
source_endpoint_id: ""
destinations_endpoints_ids:
  - ""

replication_state:
  method: incremental

  # The last committed high-water mark (cursor) used for the next run.
  # Use the same semantics as your config (inclusive/exclusive) and tie-breakers.
  cursor:
    field_path: [created]
    mode: inclusive
    value: "2025-12-25T10:30:15Z"
    tie_breakers:
      - field_path: [id]
        value: "tr_9f3c2a"

  # Overlap handling (matches config); useful for debugging and audits
  safety_window_seconds: 120

  # Checkpointing during a run (updated periodically)
  checkpoint:
    last_checkpoint_at: "2025-12-25T10:31:00Z"
    records_processed_since_checkpoint: 500
    last_seen_record_key:
      - "tr_9f3c2a"

delivery_state:
  # Optional: per-destination progress and error counters
  destinations:
    - endpoint_id: ""
      last_success_at: "2025-12-25T10:31:10Z"
      counters:
        upserts: 480
        failures: 20
        dlq: 20

# Retry/backoff state for transient failures
retry_state:
  consecutive_failures: 0
  next_retry_at: null

# Last run summary (keep it small; detailed logs go in a runs table)
last_run:
  run_id: "run_20251225_103000_abc123"
  started_at: "2025-12-25T10:30:00Z"
  finished_at: "2025-12-25T10:31:10Z"
  outcome: success            # success | failed | cancelled
  error_summary: null
