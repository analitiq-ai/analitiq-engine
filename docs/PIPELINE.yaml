# Pipeline JSON (YAML representation)
version: "1"

org_id: ""
pipeline_id: "b0c2f9d0-3b2a-4a7e-8c86-1b9c6c2d7b15"
name: "Wise Multi-Stream to SevDesk Integration"
status: active
tags:
  - finance
  - wise
  - sevdesk

# Connection aliases are generated/managed by the product (UI/back-end),
# users simply select connections in the UI.
connections:
  - conn_1: "b4904c77-0a4a-4a8d-a768-4a8b5f2f2414"
  - conn_2: "b452b1b2-34f9-4175-a47b-3dd6a4012230"
  # optional future:
  # - dlq: "deadletter-connection-uuid"

schedule:
  type: interval # can be one of: manual, interval, cron
  timezone: UTC
  interval_minutes: "1440"

engine:
  vcpu: 1
  memory: 8192
  buffer_size: "5000"

runtime:
  # Default expression configuration for all streams in this pipeline.
  # Streams may optionally override (rare).
  expression:
    lang: "jsonata"
    policy:
      max_ops: 200
      max_depth: 20
      max_string_len: 10000

  logging:
    log_level: DEBUG
    metrics_enabled: true

  # Default error-handling policy; streams and individual field assignments
  # may override on a case-by-case basis.
  error_handling:
    strategy: dlq
    max_retries: "3"
    retry_delay: "5"

  batching:
    batch_size: "100" # If not defined, then batching is not supported.
    max_concurrent_batches: "3"

# Optional: declare which function catalogs (and versions) the pipeline uses.
# Your UI uses this to present transforms/functions and your runtime uses it
# to validate and execute mapping AST nodes.
function_catalog:
  catalog_id: "core"
  version: 1.0
  # Optional: pin/allow-list specific functions for governance
  # allow:
  #   - get
  #   - coalesce
  #   - default
  #   - concat
  #   - trim
  #   - lower
  #   - iso_to_date

created_at: "2025-12-25T10:15:00Z"
updated_at: "2025-12-25T10:20:00Z"
