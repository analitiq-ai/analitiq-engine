# Stream JSON (YAML representation)
stream_id: "f1a2b3c4-d5e6-7890-abcd-ef1234567891"
pipeline_id: "b0c2f9d0-3b2a-4a7e-8c86-1b9c6c2d7b15"

tags:
  - tag1
  - tag2

source:
  connection_ref: "conn_1" # reference to the connection alias in the pipeline json
  endpoint_id: "5a4b9e21-441f-4bc7-9d5e-41917b4357e6"

  primary_key:
    - id

  replication:
    method: incremental            # incremental | full
    cursor_field:                 # token-array path for UI safety
      - created

  # Optional: connector-specific parameters/filters used by the source endpoint
  parameters: {}

# Multi-destination-ready from day one
destinations:
  - connection_ref: "conn_2" # reference to the connection alias in the pipeline json
    endpoint_id: "1e63d782-4b67-4b7e-b845-4b4de5e4f46e"

    write:
      mode: upsert                # insert | upsert | update

mapping:
  # One unified list of assignment rules (field-by-field build of the destination payload)
  assignments:
    - target:
        path: [objectName]
        type: string
        nullable: false
      value:
        kind: const # const or expr
        const: { type: string, value: "CheckAccountTransaction" }

    - target:
        path: [status]
        type: string
        nullable: false
      value:
        kind: const
        const: { type: string, value: "100" }

    - target:
        path: [checkAccount]
        type: object
        nullable: false
      value:
        kind: const
        const:
          type: object
          value:
            id: "5936402"
            objectName: "CheckAccount"

    - target:
        path: [valueDate]
        type: date
        nullable: false
      value:
        kind: expr
        expr:
          op: pipe # get, const, pipe, fn
          args:
            - { op: get, path: [created] }
            - { op: fn, name: iso_to_date, version: 1, args: [] }
      validate:
        rules:
          - type: not_null
        on_error: dlq

    - target:
        path: [paymtPurpose]
        type: string
        nullable: true
      value:
        kind: expr
        expr: { op: get, path: [details, reference] }

    - target:
        path: [amount]
        type: decimal
        nullable: false
      value:
        kind: expr
        expr: { op: get, path: [targetValue] }
      validate:
        rules:
          - type: not_null
        on_error: dlq